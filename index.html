<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEVIN GAMES - A Maior Plataforma de Jogos</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <div id="perfHud" class="performance-hud"><span id="fpsVal">--</span> FPS</div>

    <div class="top-controls">
        <button id="btnInstallPwa" class="btn-top btn-install">📥 App</button>
        <button id="themeToggle" class="btn-top">
            <span id="themeIcon">☀️</span> <span id="themeText">Luz</span>
        </button>
    </div>

    <canvas id="particles-canvas"></canvas>

    <header>
        <h1>STEVIN GAMES</h1>
        <p>Mais de 1000 jogos grátis, sem bloqueios. Escolha sua categoria e jogue agora!</p>
    </header>

    <div class="games-counter" id="gamesCounter">Carregando motor de alta performance...</div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar por título, categoria ou estilo...">
    </div>

    <div class="filters" id="filterContainer">
        <button class="filter-btn active" data-filter="all">Todos</button>
        <button class="filter-btn btn-fav" data-filter="fav">⭐ Favoritos</button>
        <button class="filter-btn" data-filter="acao">Ação & FPS</button>
        <button class="filter-btn" data-filter="arcade">Arcade & Friv</button>
        <button class="filter-btn" data-filter="corrida">Corrida</button>
        <button class="filter-btn" data-filter="io">.IO & Arena</button>
        <button class="filter-btn" data-filter="aventura">Aventura & RPG</button>
        <button class="filter-btn" data-filter="esporte">Esportes</button>
        <button class="filter-btn" data-filter="puzzle">Quebra-Cabeça</button>
    </div>

    <div class="container" id="gamesContainer">
        </div>

    <a href="#" class="discord-btn" title="Junte-se à comunidade!">💬</a>

    <div class="modal-overlay" id="gameModal">
        <div class="modal-content" id="modalContent">
            <button class="cinema-toggle-btn" id="cinemaToggle">🎬 Modo Cinema</button>
            <span class="close-modal" id="closeModal">&times;</span>
            <div id="modalBody" style="display: flex; flex-direction: column; flex-grow: 1; align-items: center; justify-content: center; width: 100%; height: 100%; position: relative;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
