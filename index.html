<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEVIN GAMES - 500 Jogos Premium</title>
    <style>
        /* =========================================
           CSS TEMA CLARO PREMIUM - HARDWARE ACCELERATED
           ========================================= */
        :root {
            --bg-color: #f0f4f8; 
            --surface-color: rgba(255, 255, 255, 0.75); 
            --primary-accent: #4F46E5; 
            --secondary-accent: #EC4899; 
            --text-main: #0f172a; 
            --text-muted: #475569; 
            --glass-border: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 6px;
            border: 3px solid #e2e8f0;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-accent);
        }

        body {
            background: radial-gradient(circle at top center, #ffffff 0%, #e2e8f0 100%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
            position: relative;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            /* Otimização de GPU */
            will-change: transform, opacity;
        }

        /* Animação Clássica de Entrada Triunfal Preservada */
        @keyframes entradaTriunfal {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.92);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        header {
            text-align: center;
            padding: 6rem 2rem 3rem 2rem;
            background: radial-gradient(circle at top, rgba(79, 70, 229, 0.05) 0%, transparent 70%);
            animation: entradaTriunfal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            will-change: transform, opacity;
        }

        h1 {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            color: transparent;
            font-size: 4.8rem; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 1rem;
            text-shadow: 0 15px 35px rgba(79, 70, 229, 0.2);
            position: relative;
            display: inline-block;
        }

        p {
            color: var(--text-muted);
            font-size: 1.4rem;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        .search-container {
            text-align: center;
            margin: 0 auto 3rem auto;
            animation: entradaTriunfal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.15s;
            opacity: 0;
            will-change: transform, opacity;
        }

        .search-input {
            padding: 1.2rem 2.5rem;
            width: 85%;
            max-width: 650px;
            border-radius: 50px;
            border: 2px solid var(--glass-border);
            background-color: rgba(255, 255, 255, 0.7);
            color: var(--text-main);
            font-size: 1.15rem;
            outline: none;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            font-weight: 500;
        }

        .search-input::placeholder {
            color: #94a3b8;
        }

        .search-input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 30px rgba(79, 70, 229, 0.25);
            transform: scale(1.03) translateY(-2px);
            background-color: #ffffff;
        }

        .filters {
            text-align: center;
            margin-bottom: 4rem;
            animation: entradaTriunfal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.25s;
            opacity: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1.2rem;
            padding: 0 1rem;
            will-change: transform, opacity;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            color: var(--text-muted);
            padding: 0.8rem 2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            font-size: 0.95rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.04);
        }

        .filter-btn:hover {
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary-accent);
            border-color: var(--primary-accent);
            transform: translateY(-3px);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 12px 25px rgba(79, 70, 229, 0.35);
            transform: translateY(-3px) scale(1.05);
        }

        .container {
            max-width: 1600px; 
            margin: 0 auto 5rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 3rem;
        }

        /* Otimização de renderização no card */
        .game-card {
            background-color: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 20px;
            padding: 0; 
            text-align: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            animation: entradaTriunfal 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            will-change: transform, box-shadow; /* Otimização GPU */
        }

        .game-cover {
            width: 100%;
            height: 200px;
            position: relative;
            overflow: hidden;
            background-color: #0f172a;
            border-bottom: 4px solid rgba(79, 70, 229, 0.1);
        }

        .game-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.5s ease;
            will-change: transform;
        }

        .game-content {
            padding: 1.8rem 2.2rem 2.2rem 2.2rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 100%);
        }

        .category-tag {
            position: absolute;
            top: 18px;
            right: -40px;
            background: linear-gradient(90deg, var(--secondary-accent), #f43f5e);
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: 800;
            padding: 8px 45px;
            transform: rotate(45deg);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4);
            z-index: 10;
        }

        .game-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-accent), var(--secondary-accent));
            transform: scaleX(0);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
            transform-origin: left;
        }

        .game-card:hover {
            transform: translateY(-18px) scale(1.03);
            border-color: rgba(255, 255, 255, 1);
            box-shadow: 0 30px 60px rgba(79, 70, 229, 0.18), inset 0 0 30px rgba(255, 255, 255, 0.8);
            background-color: rgba(255, 255, 255, 0.98);
        }

        .game-card:hover .game-cover img {
            transform: scale(1.2) rotate(2deg); 
            filter: brightness(1.1);
        }

        .game-card:hover::after {
            transform: scaleX(1);
        }

        .game-title {
            color: var(--text-main);
            font-size: 1.5rem;
            margin-bottom: 1rem;
            transition: color 0.3s ease;
            position: relative;
            z-index: 1;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .game-card:hover .game-title {
            color: var(--primary-accent);
        }

        .game-desc {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            flex-grow: 1;
            position: relative;
            z-index: 1;
            font-weight: 500;
        }

        .btn-play {
            background-color: rgba(79, 70, 229, 0.08);
            color: var(--primary-accent);
            border: 2px solid rgba(79, 70, 229, 0.3);
            padding: 1.2rem 2.5rem;
            font-size: 1.05rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            width: 100%;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .btn-play:hover {
            background-color: var(--primary-accent);
            color: #ffffff;
            border-color: var(--primary-accent);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.4);
            transform: translateY(-2px);
        }

        /* Modal Focado em Imersão */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #000;
            border: 2px solid var(--primary-accent);
            border-radius: 16px;
            padding: 0; 
            width: 98%;
            max-width: 1800px;
            height: 96vh;
            text-align: center;
            position: relative;
            animation: entradaTriunfal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 0 100px rgba(79, 70, 229, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 2.5rem;
            color: #ffffff;
            background: rgba(255,255,255,0.1);
            width: 50px;
            height: 50px;
            line-height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .close-modal:hover {
            color: #ffffff;
            background: var(--secondary-accent);
            border-color: var(--secondary-accent);
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 20px var(--secondary-accent);
        }

        .loader {
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary-accent);
            border-right: 5px solid var(--secondary-accent);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .game-frame {
            width: 100%;
            height: 100%;
            flex-grow: 1;
            border: none;
            background-color: #000;
        }
        
        .games-counter {
            color: var(--primary-accent);
            font-size: 1.2rem;
            margin-top: -2.5rem;
            margin-bottom: 3rem;
            font-weight: 900;
            letter-spacing: 4px;
            animation: entradaTriunfal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.35s;
            opacity: 0;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 5px 15px rgba(79, 70, 229, 0.15);
            will-change: transform, opacity;
        }

        .discord-btn {
            position: fixed;
            bottom: 35px;
            right: 35px;
            background-color: #5865F2;
            color: white;
            border-radius: 50%;
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.5);
            cursor: pointer;
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            animation: entradaTriunfal 1.5s ease forwards, pulseDiscord 2s infinite 2s;
            border: 4px solid #ffffff;
            will-change: transform, box-shadow;
        }

        .discord-btn:hover {
            transform: scale(1.2) translateY(-8px) rotate(-10deg);
            box-shadow: 0 20px 40px rgba(88, 101, 242, 0.7);
            background-color: #4752C4;
            border-color: #e2e8f0;
        }

        .discord-btn img {
            width: 45px;
            height: 45px;
            filter: brightness(0) invert(1);
        }

        @keyframes pulseDiscord {
            0% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0.8); }
            70% { box-shadow: 0 0 0 25px rgba(88, 101, 242, 0); }
            100% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0); }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // ==========================================
            // SISTEMA DE PARTÍCULAS INTERATIVAS (Otimizado)
            // ==========================================
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particlesArray = [];
            let isModalOpen = false; // Flag global de performance

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const mouse = { x: null, y: null, radius: 180 }

            window.addEventListener('mousemove', function(event) {
                mouse.x = event.x;
                mouse.y = event.y;
            });

            window.addEventListener('resize', function() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initParticles();
            });

            class Particle {
                constructor(x, y, directionX, directionY, size, color) {
                    this.x = x;
                    this.y = y;
                    this.directionX = directionX;
                    this.directionY = directionY;
                    this.size = size;
                    this.color = color;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
                update() {
                    if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                    if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx*dx + dy*dy);
                    
                    if (distance < mouse.radius) {
                        if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 2;
                        if (mouse.x > this.x && this.x > this.size * 10) this.x -= 2;
                        if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 2;
                        if (mouse.y > this.y && this.y > this.size * 10) this.y -= 2;
                    }
                    this.x += this.directionX;
                    this.y += this.directionY;
                    this.draw();
                }
            }

            function initParticles() {
                particlesArray = [];
                let numberOfParticles = (canvas.height * canvas.width) / 10000; 
                for (let i = 0; i < numberOfParticles; i++) {
                    let size = (Math.random() * 3) + 1;
                    let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                    let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                    let directionX = (Math.random() * 0.8) - 0.4;
                    let directionY = (Math.random() * 0.8) - 0.4;
                    let color = Math.random() > 0.5 ? '#4F46E5' : '#EC4899'; 
                    particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
                }
            }

            function animateParticles() {
                requestAnimationFrame(animateParticles);
                // OTIMIZAÇÃO: Só processa e desenha partículas se o modal do jogo estiver FECHADO
                if (!isModalOpen) {
                    ctx.clearRect(0, 0, innerWidth, innerHeight);
                    for (let i = 0; i < particlesArray.length; i++) {
                        particlesArray[i].update();
                    }
                    connectParticles();
                }
            }

            function connectParticles() {
                let opacityValue = 1;
                for (let a = 0; a < particlesArray.length; a++) {
                    for (let b = a; b < particlesArray.length; b++) {
                        let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                            + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                        if (distance < (canvas.width / 9) * (canvas.height / 9)) {
                            opacityValue = 1 - (distance / 18000);
                            ctx.strokeStyle = 'rgba(79, 70, 229,' + opacityValue * 0.2 + ')';
                            ctx.lineWidth = 1.2;
                            ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                            ctx.stroke();
                        }
                    }
                }
            }
            initParticles();
            animateParticles();

                { title: "Papa's Pizzeria", icon: "🍕", desc: "Atenda os clientes, asse as pizzas e gerencie a lanchonete clássica.", url: "https://www.crazygames.com/embed/papas-pizzeria", cat: "friv", cover: proxy + "images.crazygames.com/games/papas-pizzeria/cover-1583232679237.png" },
                { title: "Vex 7", icon: "🏃", desc: "Pule espinhos e deslize por paredes neste desafio de plataforma hardcore.", url: "https://www.crazygames.com/embed/vex-7", cat: "friv", cover: proxy + "images.crazygames.com/games/vex-7/cover-1666874258814.png" },
                { title: "Stickman Hook", icon: "🕸️", desc: "Use a física para balançar como o homem-aranha pelas fases.", url: "https://www.crazygames.com/embed/stickman-hook", cat: "friv", cover: proxy + "images.crazygames.com/games/stickman-hook/cover-1583231656041.jpeg" },

                { title: "Bubble Shooter", icon: "🔵", desc: "Estoure bolhas da mesma cor no clássico quebra-cabeça viciante.", url: "https://www.crazygames.com/embed/bubble-shooter", cat: "friv", cover: proxy + "images.crazygames.com/games/bubble-shooter/cover-1583232145524.jpeg" },

            // ==========================================

            // ==========================================

                "730", "578080", "1172470", "440", "105600", "252490", "570", "271590", "367520", "322170", 
                "1086940", "230410", "4000", "236390", "1091500", "292030", "1245620", "383150", "220", "17390", 
                "322330", "1097150", "1182480", "311210", "620", "504230", "10", "518060", "470220", "431960"
            ];

            const prefixes = ["Super", "Ultra", "Epic", "Magic", "Valor", "Pocket", "Elite", "Grand", "Cyber", "Neon", "Retro", "Ninja", "Dark", "Light", "Crystal", "Royal"];
            const nouns = ["Strike", "Atelier", "Quest", "Combat", "Arena", "Dash", "Royale", "Legends", "World", "City", "Sword", "Fashion", "Run", "Force"];
            const suffixes = ["Online", "3D", "Pro", "Elite", "Max", "Simulator", "V", "X", "Zero", "Infinity", "Showdown"];

            const validLinks = {
                fps: ["https://www.crazygames.com/embed/smash-karts", "https://www.crazygames.com/embed/shellshockersio", "https://www.crazygames.com/embed/1v1-lol", "https://www.crazygames.com/embed/bullet-force-multiplayer"],
                io: ["https://www.crazygames.com/embed/agar-io-lite", "https://www.crazygames.com/embed/zombs-royale", "https://www.crazygames.com/embed/paper-io-2"],
                puzzle: ["https://www.crazygames.com/embed/master-chess", "https://www.crazygames.com/embed/uno-online", "https://www.crazygames.com/embed/2048", "https://www.crazygames.com/embed/ducklings"],
                anime: ["https://www.crazygames.com/embed/anime-battle-4", "https://www.crazygames.com/embed/anime-dress-up"],
                moda: ["https://www.crazygames.com/embed/fashion-stylist", "https://www.crazygames.com/embed/vibe-fashion"],
                fogoagua: ["https://www.crazygames.com/embed/fireboy-and-watergirl-the-forest-temple", "https://www.crazygames.com/embed/fireboy-and-watergirl-2-light-temple"],
                friv: ["https://www.crazygames.com/embed/moto-x3m", "https://www.crazygames.com/embed/papas-pizzeria", "https://www.crazygames.com/embed/vex-7", "https://www.crazygames.com/embed/stickman-hook", "https://www.crazygames.com/embed/slope", "https://www.crazygames.com/embed/bubble-shooter", "https://www.crazygames.com/embed/monkey-mart"]
            };

            const catPool = ["fps", "io", "puzzle", "anime", "moda", "fogoagua", "friv"];

            let count = gamesDatabase.length;
            while (count < 500) {
                const pre = prefixes[Math.floor(Math.random() * prefixes.length)];
                const nou = nouns[Math.floor(Math.random() * nouns.length)];
                const suf = suffixes[Math.floor(Math.random() * suffixes.length)];
                const generatedName = `${pre} ${nou} ${suf}`;
                
                const randomCat = catPool[Math.floor(Math.random() * catPool.length)];
                const categoryLinks = validLinks[randomCat];
                const randomUrl = categoryLinks[Math.floor(Math.random() * categoryLinks.length)];
                const randomImageId = imageLibrary[count % imageLibrary.length];

                let icon = "🎮";
                let desc = "Aventura digital para desafiar jogadores do mundo inteiro.";
                let coverGenerated = proxy + `cdn.akamai.steamstatic.com/steam/apps/${randomImageId}/header.jpg`;

                if(randomCat === 'fps') { 
                    icon = "🔫"; desc = "Sobreviva ao campo de batalha, utilize táticas avançadas e elimine seus inimigos."; 
                } else if(randomCat === 'io') { 
                    icon = "🌐"; desc = "Conquiste território e cresça sua base neste mundo online competitivo."; 
                } else if(randomCat === 'anime') { 
                    icon = "⚔️"; desc = "Libere habilidades secretas e lute como os maiores heróis das animações."; 
                } else if(randomCat === 'moda') { 
                    icon = "👗"; desc = "Liberte sua criatividade e estilo montando visuais incríveis com peças de grife."; 
                    coverGenerated = proxy + "images.crazygames.com/fashion-stylist/cover-1681223963784.png";
                } else if(randomCat === 'fogoagua') { 
                    icon = "🔥💧"; desc = "Colabore em equipe resolvendo puzzles baseados em elementos da natureza."; 
                    coverGenerated = proxy + "images.crazygames.com/games/fireboy-and-watergirl-the-forest-temple/cover-1586285096181.png";
                } else if(randomCat === 'puzzle') { 
                    icon = "🧩"; desc = "Treine seu cérebro e resolva os enigmas mais difíceis da web."; 
                } else if(randomCat === 'friv') { 
                    icon = "🕹️"; desc = "Reviva a nostalgia dos jogos clássicos de navegador direto na sua tela."; 
                    coverGenerated = proxy + "images.crazygames.com/games/moto-x3m/cover-1586173926884.jpeg"; 
                }

                gamesDatabase.push({
                    title: generatedName,
                    icon: icon,
                    desc: desc,
                    url: randomUrl,
                    cat: randomCat,
                    cover: coverGenerated
                });
                count++;
            }

            const container = document.getElementById('gamesContainer');
            const gamesCounter = document.getElementById('gamesCounter');

            // ==========================================
            // OTIMIZAÇÃO DE RENDERIZAÇÃO: DOM Fragment Pattern
            // ==========================================
            function renderGames(games) {
                // Em vez de forçar o navegador a desenhar 500 vezes, nós criamos o HTML na memória
                // e o navegador desenha TUDO de uma única vez. (Reflow zero)
                gamesCounter.textContent = `${games.length} Jogos na Plataforma (Arquitetura Ultra Fast)`;
                let htmlString = '';

                games.forEach((game, index) => {
                    const delay = (index % 15) * 0.08; 
                    
                    let catLabel = 'Casual';
                    if(game.cat === 'fps') catLabel = 'Ação';
                    else if(game.cat === 'io') catLabel = 'Estratégia';
                    else if(game.cat === 'anime') catLabel = 'Anime';
                    else if(game.cat === 'fogoagua') catLabel = 'Fogo & Água';
                    else if(game.cat === 'moda') catLabel = 'Moda';
                    else if(game.cat === 'puzzle') catLabel = 'Cartas/Puzzle';
                    else if(game.cat === 'friv') catLabel = 'Friv Clássico';

                    htmlString += `
                        <div class="game-card" data-title="${game.title}" data-url="${game.url}" data-cat="${game.cat}" style="animation-delay: ${delay}s">
                            <div class="game-cover">
                                <img src="${game.cover}" alt="Capa polida de ${game.title}" loading="lazy">
                                <div class="category-tag">${catLabel}</div>
                            </div>
                            <div class="game-content">
                                <div>
                                    <h2 class="game-title">${game.icon} ${game.title}</h2>
                                    <p class="game-desc">${game.desc}</p>
                                </div>
                                <button class="btn-play">▶ Jogar Agora</button>
                            </div>
                        </div>
                    `;
                });
                
                // Única injeção no DOM - Alta performance
                container.innerHTML = htmlString;
                attachPlayEvents();
            }

            renderGames(gamesDatabase);

            // ==========================================
            // OTIMIZAÇÃO DE BUSCA: Debounce Engine
            // ==========================================
            const searchInput = document.getElementById('searchInput');
            let searchTimeout;

            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                const activeFilter = document.querySelector('.filter-btn.active').getAttribute('data-filter');
                
                // Cancela as buscas anteriores se o usuário estiver digitando rápido
                clearTimeout(searchTimeout);
                
                // Só processa 300ms depois que ele parar de digitar
                searchTimeout = setTimeout(() => {
                    const filtered = gamesDatabase.filter(game => {
                        const matchesSearch = game.title.toLowerCase().includes(searchTerm) || game.desc.toLowerCase().includes(searchTerm);
                        const matchesFilter = activeFilter === 'all' || game.cat === activeFilter;
                        return matchesSearch && matchesFilter;
                    });
                    renderGames(filtered);
                }, 300);
            });

            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const filterValue = btn.getAttribute('data-filter');
                    const searchTerm = searchInput.value.toLowerCase();

                    const filtered = gamesDatabase.filter(game => {
                        const matchesFilter = filterValue === 'all' || game.cat === filterValue;
                        const matchesSearch = game.title.toLowerCase().includes(searchTerm) || game.desc.toLowerCase().includes(searchTerm);
                        return matchesFilter && matchesSearch;
                    });
                    
                    renderGames(filtered);
                });
            });

            // ==========================================
            // MOTOR DE MODAL COM PERMISSÕES RÍGIDAS
            // ==========================================
            const modal = document.getElementById('gameModal');
            const closeModalBtn = document.getElementById('closeModal');
            const modalBody = document.getElementById('modalBody');

            function attachPlayEvents() {
                const playButtons = document.querySelectorAll('.btn-play');
                playButtons.forEach(button => {
                    button.addEventListener('click', (e) => {
                        const card = e.target.closest('.game-card');
                        const gameUrl = card.getAttribute('data-url');

                        // Pausa o fundo para dar potência total ao jogo
                        isModalOpen = true; 

                        modalBody.innerHTML = `
                            <div class="loader" style="margin-top: 20vh;"></div>
                            <p style="color: var(--primary-accent); margin-top: 25px; font-weight: 900; font-size: 1.3rem; text-transform: uppercase; letter-spacing: 3px;">Iniciando Motor do Jogo...</p>
                        `;
                        modal.style.display = 'flex';

                        setTimeout(() => {
                            modalBody.innerHTML = `
                                <iframe 
                                    src="${gameUrl}" 
                                    class="game-frame" 
                                    allow="fullscreen; autoplay; gamepad; pointer-lock; clipboard-write; display-capture" 
                                    frameborder="0"
                                    scrolling="no">
                                </iframe>
                            `;
                        }, 500);
                    });
                });
            }

            closeModalBtn.addEventListener('click', () => {
                modal.style.display = 'none';
                modalBody.innerHTML = ''; 
                // Reativa a beleza visual quando o jogo fecha
                isModalOpen = false; 
            });

            window.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                    modalBody.innerHTML = '';
                    isModalOpen = false;
                }
            });
        });
