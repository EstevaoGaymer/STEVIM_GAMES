<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEVIN GAMES - 700 Jogos Premium</title>
    <style>
        /* =========================================
           CSS TEMA PREMIUM - CLARO E ESCURO DINÂMICO
           Hardware Accelerated & Glassmorphism Mantido Intacto
           ========================================= */
        :root {
            /* Variáveis do Modo Claro (Padrão) */
            --bg-color: #f0f4f8; 
            --surface-color: rgba(255, 255, 255, 0.75); 
            --primary-accent: #4F46E5; 
            --secondary-accent: #EC4899; 
            --text-main: #0f172a; 
            --text-muted: #475569; 
            --glass-border: rgba(255, 255, 255, 0.9);
            --bg-gradient: radial-gradient(circle at top center, #ffffff 0%, #e2e8f0 100%);
            --shadow-color: rgba(0, 0, 0, 0.08);
            --transition-speed: 0.4s;
        }

        /* Variáveis do Modo Escuro Premium (Ouro/Realeza) */
        body.dark-mode {
            --bg-color: #0f172a; 
            --surface-color: rgba(15, 23, 42, 0.75); 
            --primary-accent: #fbbf24; 
            --secondary-accent: #f59e0b; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-gradient: radial-gradient(circle at top center, #1e293b 0%, #020617 100%);
            --shadow-color: rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 6px;
            border: 3px solid var(--bg-color);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-accent);
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
            position: relative;
            transition: background var(--transition-speed) ease, color var(--transition-speed) ease;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* Botão de Tema Luxuoso */
        .theme-toggle {
            position: absolute;
            top: 30px;
            right: 40px;
            background: var(--surface-color);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            box-shadow: 0 10px 25px var(--shadow-color);
            animation: entradaTriunfal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .theme-toggle:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: var(--primary-accent);
            color: var(--primary-accent);
            box-shadow: 0 15px 35px rgba(251, 191, 36, 0.2);
        }

        /* Animação Clássica de Entrada Triunfal */
        @keyframes entradaTriunfal {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.92);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Animação de Reflexo de Vidro Premium */
        @keyframes glassShine {
            0% { left: -150%; }
            100% { left: 150%; }
        }

        header {
            text-align: center;
            padding: 7rem 2rem 3rem 2rem;
            animation: entradaTriunfal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            will-change: transform, opacity;
        }

        h1 {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            color: transparent;
            font-size: 4.8rem; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 1rem;
            text-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            position: relative;
            display: inline-block;
            transition: all var(--transition-speed) ease;
        }

        p {
            color: var(--text-muted);
            font-size: 1.4rem;
            letter-spacing: 1.5px;
            font-weight: 500;
            transition: color var(--transition-speed) ease;
        }

        .search-container {
            text-align: center;
            margin: 0 auto 3rem auto;
            animation: entradaTriunfal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.15s;
            opacity: 0;
            will-change: transform, opacity;
        }

        .search-input {
            padding: 1.2rem 2.5rem;
            width: 85%;
            max-width: 650px;
            border-radius: 50px;
            border: 2px solid var(--glass-border);
            background-color: var(--surface-color);
            color: var(--text-main);
            font-size: 1.15rem;
            outline: none;
            transition: all var(--transition-speed) cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px var(--shadow-color);
            font-weight: 500;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.2);
            transform: scale(1.03) translateY(-2px);
            background-color: var(--bg-color);
        }

        .filters {
            text-align: center;
            margin-bottom: 4rem;
            animation: entradaTriunfal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.25s;
            opacity: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1.2rem;
            padding: 0 1rem;
            will-change: transform, opacity;
        }

        .filter-btn {
            background: var(--surface-color);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            color: var(--text-muted);
            padding: 0.8rem 2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            font-size: 0.95rem;
            box-shadow: 0 5px 20px var(--shadow-color);
        }

        .filter-btn:hover {
            background: rgba(251, 191, 36, 0.1);
            color: var(--primary-accent);
            border-color: var(--primary-accent);
            transform: translateY(-3px);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            color: #ffffff; 
            border-color: transparent;
            box-shadow: 0 12px 25px rgba(251, 191, 36, 0.35);
            transform: translateY(-3px) scale(1.05);
        }

        .container {
            max-width: 1600px; 
            margin: 0 auto 5rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 3rem;
            content-visibility: auto;
            contain-intrinsic-size: 1000px;
        }

        .game-card {
            background-color: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 0; 
            text-align: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            animation: entradaTriunfal 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px var(--shadow-color);
            will-change: transform, box-shadow;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            z-index: 15;
            transition: none;
            pointer-events: none;
        }

        .game-card:hover::before {
            animation: glassShine 0.8s ease forwards;
        }

        .game-cover {
            width: 100%;
            height: 200px;
            position: relative;
            overflow: hidden;
            background-color: #000;
            border-bottom: 4px solid var(--primary-accent);
        }

        .game-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.5s ease;
            will-change: transform;
        }

        .game-content {
            padding: 1.8rem 2.2rem 2.2rem 2.2rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
            background: linear-gradient(to bottom, transparent 0%, var(--surface-color) 100%);
        }

        .category-tag {
            position: absolute;
            top: 18px;
            right: -40px;
            background: linear-gradient(90deg, var(--secondary-accent), var(--primary-accent));
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: 900;
            padding: 8px 45px;
            transform: rotate(45deg);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .game-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-accent), var(--secondary-accent));
            transform: scaleX(0);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
            transform-origin: left;
        }

        .game-card:hover {
            transform: translateY(-18px) scale(1.03);
            border-color: var(--primary-accent);
            box-shadow: 0 30px 60px var(--shadow-color), inset 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .game-card:hover .game-cover img {
            transform: scale(1.2) rotate(2deg); 
            filter: brightness(1.1);
        }

        .game-card:hover::after {
            transform: scaleX(1);
        }

        .game-title {
            color: var(--text-main);
            font-size: 1.5rem;
            margin-bottom: 1rem;
            transition: color 0.3s ease;
            position: relative;
            z-index: 1;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .game-card:hover .game-title {
            color: var(--primary-accent);
        }

        .game-desc {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            flex-grow: 1;
            position: relative;
            z-index: 1;
            font-weight: 500;
        }

        .btn-play {
            background-color: transparent;
            color: var(--primary-accent);
            border: 2px solid var(--primary-accent);
            padding: 1.2rem 2.5rem;
            font-size: 1.05rem;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            transition: all var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            width: 100%;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .btn-play:hover {
            background-color: var(--primary-accent);
            color: #0f172a; 
            box-shadow: 0 15px 30px rgba(251, 191, 36, 0.4);
            transform: translateY(-2px);
        }

        body:not(.dark-mode) .btn-play:hover {
            color: #ffffff; 
        }

        /* Modal Focado em Imersão e Desempenho */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #000;
            border: 2px solid var(--primary-accent);
            border-radius: 16px;
            padding: 0; 
            width: 98%;
            max-width: 1800px;
            height: 96vh;
            text-align: center;
            position: relative;
            animation: entradaTriunfal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 0 100px var(--primary-accent);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 2.5rem;
            color: #ffffff;
            background: rgba(255,255,255,0.1);
            width: 50px;
            height: 50px;
            line-height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: all var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .close-modal:hover {
            color: #ffffff;
            background: var(--secondary-accent);
            border-color: var(--secondary-accent);
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 20px var(--secondary-accent);
        }

        .loader-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .loader {
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary-accent);
            border-right: 5px solid var(--secondary-accent);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .game-frame {
            width: 100%;
            height: 100%;
            flex-grow: 1;
            border: none;
            background-color: #000;
            position: relative;
            z-index: 20;
        }
        
        .games-counter {
            color: var(--primary-accent);
            font-size: 1.2rem;
            margin-top: -2.5rem;
            margin-bottom: 3rem;
            font-weight: 900;
            letter-spacing: 4px;
            animation: entradaTriunfal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.35s;
            opacity: 0;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 5px 15px var(--shadow-color);
            will-change: transform, opacity;
        }

        /* Botão Flutuante Discord - Intacto */
        .discord-btn {
            position: fixed;
            bottom: 35px;
            right: 35px;
            background-color: #5865F2;
            color: white;
            border-radius: 50%;
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.5);
            cursor: pointer;
            z-index: 999;
            transition: all var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            animation: entradaTriunfal 1.5s ease forwards, pulseDiscord 2s infinite 2s;
            border: 4px solid #ffffff;
            will-change: transform, box-shadow;
        }

        .discord-btn:hover {
            transform: scale(1.2) translateY(-8px) rotate(-10deg);
            box-shadow: 0 20px 40px rgba(88, 101, 242, 0.7);
            background-color: #4752C4;
            border-color: #e2e8f0;
        }

        .discord-btn img {
            width: 45px;
            height: 45px;
            filter: brightness(0) invert(1);
        }

        @keyframes pulseDiscord {
            0% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0.8); }
            70% { box-shadow: 0 0 0 25px rgba(88, 101, 242, 0); }
            100% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0); }
        }
    </style>
</head>
<body>

    <button id="themeToggle" class="theme-toggle">
        <span id="themeIcon">🌙</span> <span id="themeText">Modo Escuro</span>
    </button>

    <canvas id="particles-canvas"></canvas>

    <header>
        <h1>STEVIN GAMES</h1>
        <p>A Maior e Mais Bela Plataforma Imersiva da Web</p>
    </header>

    <div class="games-counter" id="gamesCounter">Carregando Catálogo Gigante...</div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar por título épico, categoria ou estilo...">
    </div>

    <!-- Filtros Inteligentes Expandidos -->
    <div class="filters" id="filterContainer">
        <button class="filter-btn active" data-filter="all">Todos os 700 Jogos</button>
        <button class="filter-btn" data-filter="friv">Friv & Click Jogos</button>
        <button class="filter-btn" data-filter="fps">Ação & Luta</button>
        <button class="filter-btn" data-filter="anime">Anime & Ninja</button>
        <button class="filter-btn" data-filter="aventura">Aventura</button>
        <button class="filter-btn" data-filter="rpg">RPG Clássico</button>
        <button class="filter-btn" data-filter="arcade">Arcade & DOS</button>
        <button class="filter-btn" data-filter="moda">Roupas & Moda</button>
        <button class="filter-btn" data-filter="fogoagua">Fogo & Água</button>
        <button class="filter-btn" data-filter="puzzle">Quebra-Cabeça</button>
        <button class="filter-btn" data-filter="io">.IO & Estratégia</button>
    </div>

    <div class="container" id="gamesContainer">
        <!-- O Banco de Dados Completo será injetado aqui via Buffer -->
    </div>

    <a href="#" class="discord-btn" title="Junte-se à comunidade Stevin Games no Discord!">
        💬
    </a>

    <div class="modal-overlay" id="gameModal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <div id="modalBody" style="display: flex; flex-direction: column; flex-grow: 1; align-items: center; justify-content: center; width: 100%; height: 100%; position: relative;">
                <!-- Conteúdo do Iframe entra aqui dinamicamente -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // ==========================================
            // SISTEMA DE THEME TOGGLE (CLARO E ESCURO)
            // ==========================================
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                
                themeIcon.textContent = isDark ? '☀️' : '🌙';
                themeText.textContent = isDark ? 'Modo Claro' : 'Modo Escuro';
                
                particlesArray.forEach(p => {
                    if (isDark) {
                        p.color = Math.random() > 0.5 ? '#fbbf24' : '#f59e0b'; 
                    } else {
                        p.color = Math.random() > 0.5 ? '#4F46E5' : '#EC4899'; 
                    }
                });
            });

            // ==========================================
            // SISTEMA DE PARTÍCULAS INTERATIVAS
            // ==========================================
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particlesArray = [];
            let isModalOpen = false;

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const mouse = { x: null, y: null, radius: 180 }

            window.addEventListener('mousemove', function(event) {
                mouse.x = event.x;
                mouse.y = event.y;
            });

            window.addEventListener('resize', function() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initParticles();
            });

            class Particle {
                constructor(x, y, directionX, directionY, size, color) {
                    this.x = x;
                    this.y = y;
                    this.directionX = directionX;
                    this.directionY = directionY;
                    this.size = size;
                    this.color = color;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
                update() {
                    if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                    if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx*dx + dy*dy);
                    
                    if (distance < mouse.radius) {
                        if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 2;
                        if (mouse.x > this.x && this.x > this.size * 10) this.x -= 2;
                        if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 2;
                        if (mouse.y > this.y && this.y > this.size * 10) this.y -= 2;
                    }
                    this.x += this.directionX;
                    this.y += this.directionY;
                    this.draw();
                }
            }

            function initParticles() {
                particlesArray = [];
                let numberOfParticles = (canvas.height * canvas.width) / 10000; 
                const isDark = document.body.classList.contains('dark-mode');

                for (let i = 0; i < numberOfParticles; i++) {
                    let size = (Math.random() * 3) + 1;
                    let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                    let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                    let directionX = (Math.random() * 0.8) - 0.4;
                    let directionY = (Math.random() * 0.8) - 0.4;
                    
                    let color = isDark 
                        ? (Math.random() > 0.5 ? '#fbbf24' : '#f59e0b') 
                        : (Math.random() > 0.5 ? '#4F46E5' : '#EC4899'); 

                    particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
                }
            }

            function animateParticles() {
                requestAnimationFrame(animateParticles);
                if (!isModalOpen) {
                    ctx.clearRect(0, 0, innerWidth, innerHeight);
                    for (let i = 0; i < particlesArray.length; i++) {
                        particlesArray[i].update();
                    }
                    connectParticles();
                }
            }

            function connectParticles() {

                        if (distance < (canvas.width / 9) * (canvas.height / 9)) {
                            opacityValue = 1 - (distance / 18000);
                            ctx.strokeStyle = `rgba(${rgbColor}, ${opacityValue * 0.2})`;
                            ctx.lineWidth = 1.2;
                            ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                            ctx.stroke();
                        }
