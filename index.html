<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEVIN GAMES - 500 Jogos Premium</title>
    <style>
        /* =========================================
           CSS TEMA CLARO PREMIUM - HARDWARE ACCELERATED
           Todas as animações e estilos originais mantidos
           ========================================= */
        :root {
            --bg-color: #f0f4f8; 
            --surface-color: rgba(255, 255, 255, 0.75); 
            --primary-accent: #4F46E5; 
            --secondary-accent: #EC4899; 
            --text-main: #0f172a; 
            --text-muted: #475569; 
            --glass-border: rgba(255, 255, 255, 0.9);
            --transition-speed: 0.4s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 6px;
            border: 3px solid #e2e8f0;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-accent);
        }

        body {
            background: radial-gradient(circle at top center, #ffffff 0%, #e2e8f0 100%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
            position: relative;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* Animação Clássica de Entrada Triunfal Intocada e Perfeita */
        @keyframes entradaTriunfal {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.92);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        header {
            text-align: center;
            padding: 6rem 2rem 3rem 2rem;
            background: radial-gradient(circle at top, rgba(79, 70, 229, 0.05) 0%, transparent 70%);
            animation: entradaTriunfal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            will-change: transform, opacity;
        }

        h1 {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            color: transparent;
            font-size: 4.8rem; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 1rem;
            text-shadow: 0 15px 35px rgba(79, 70, 229, 0.2);
            position: relative;
            display: inline-block;
        }

        p {
            color: var(--text-muted);
            font-size: 1.4rem;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        .search-container {
            text-align: center;
            margin: 0 auto 3rem auto;
            animation: entradaTriunfal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.15s;
            opacity: 0;
            will-change: transform, opacity;
        }

        .search-input {
            padding: 1.2rem 2.5rem;
            width: 85%;
            max-width: 650px;
            border-radius: 50px;
            border: 2px solid var(--glass-border);
            background-color: rgba(255, 255, 255, 0.7);
            color: var(--text-main);
            font-size: 1.15rem;
            outline: none;
            transition: all var(--transition-speed) cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            font-weight: 500;
        }

        .search-input::placeholder {
            color: #94a3b8;
        }

        .search-input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 30px rgba(79, 70, 229, 0.25);
            transform: scale(1.03) translateY(-2px);
            background-color: #ffffff;
        }

        .filters {
            text-align: center;
            margin-bottom: 4rem;
            animation: entradaTriunfal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.25s;
            opacity: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1.2rem;
            padding: 0 1rem;
            will-change: transform, opacity;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            color: var(--text-muted);
            padding: 0.8rem 2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            font-size: 0.95rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.04);
        }

        .filter-btn:hover {
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary-accent);
            border-color: var(--primary-accent);
            transform: translateY(-3px);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 12px 25px rgba(79, 70, 229, 0.35);
            transform: translateY(-3px) scale(1.05);
        }

        .container {
            max-width: 1600px; 
            margin: 0 auto 5rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 3rem;
        }

        .game-card {
            background-color: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 20px;
            padding: 0; 
            text-align: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            animation: entradaTriunfal 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            will-change: transform, box-shadow;
        }

        .game-cover {
            width: 100%;
            height: 200px;
            position: relative;
            overflow: hidden;
            background-color: #0f172a;
            border-bottom: 4px solid rgba(79, 70, 229, 0.1);
        }

        .game-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.5s ease;
            will-change: transform;
        }

        .game-content {
            padding: 1.8rem 2.2rem 2.2rem 2.2rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 100%);
        }

        .category-tag {
            position: absolute;
            top: 18px;
            right: -40px;
            background: linear-gradient(90deg, var(--secondary-accent), #f43f5e);
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: 800;
            padding: 8px 45px;
            transform: rotate(45deg);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4);
            z-index: 10;
        }

        .game-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-accent), var(--secondary-accent));
            transform: scaleX(0);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
            transform-origin: left;
        }

        .game-card:hover {
            transform: translateY(-18px) scale(1.03);
            border-color: rgba(255, 255, 255, 1);
            box-shadow: 0 30px 60px rgba(79, 70, 229, 0.18), inset 0 0 30px rgba(255, 255, 255, 0.8);
            background-color: rgba(255, 255, 255, 0.98);
        }

        .game-card:hover .game-cover img {
            transform: scale(1.2) rotate(2deg); 
            filter: brightness(1.1);
        }

        .game-card:hover::after {
            transform: scaleX(1);
        }

        .game-title {
            color: var(--text-main);
            font-size: 1.5rem;
            margin-bottom: 1rem;
            transition: color 0.3s ease;
            position: relative;
            z-index: 1;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .game-card:hover .game-title {
            color: var(--primary-accent);
        }

        .game-desc {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            flex-grow: 1;
            position: relative;
            z-index: 1;
            font-weight: 500;
        }

        .btn-play {
            background-color: rgba(79, 70, 229, 0.08);
            color: var(--primary-accent);
            border: 2px solid rgba(79, 70, 229, 0.3);
            padding: 1.2rem 2.5rem;
            font-size: 1.05rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            transition: all var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            width: 100%;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .btn-play:hover {
            background-color: var(--primary-accent);
            color: #ffffff;
            border-color: var(--primary-accent);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.4);
            transform: translateY(-2px);
        }

        /* Modal Focado em Imersão e Desempenho */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #000;
            border: 2px solid var(--primary-accent);
            border-radius: 16px;
            padding: 0; 
            width: 98%;
            max-width: 1800px;
            height: 96vh;
            text-align: center;
            position: relative;
            animation: entradaTriunfal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 0 100px rgba(79, 70, 229, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 2.5rem;
            color: #ffffff;
            background: rgba(255,255,255,0.1);
            width: 50px;
            height: 50px;
            line-height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: all var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .close-modal:hover {
            color: #ffffff;
            background: var(--secondary-accent);
            border-color: var(--secondary-accent);
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 20px var(--secondary-accent);
        }

        .loader-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .loader {
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary-accent);
            border-right: 5px solid var(--secondary-accent);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .game-frame {
            width: 100%;
            height: 100%;
            flex-grow: 1;
            border: none;
            background-color: #000;
            position: relative;
            z-index: 20;
        }
        
        .games-counter {
            color: var(--primary-accent);
            font-size: 1.2rem;
            margin-top: -2.5rem;
            margin-bottom: 3rem;
            font-weight: 900;
            letter-spacing: 4px;
            animation: entradaTriunfal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.35s;
            opacity: 0;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 5px 15px rgba(79, 70, 229, 0.15);
            will-change: transform, opacity;
        }

        /* Botão Flutuante Discord - Intacto */
        .discord-btn {
            position: fixed;
            bottom: 35px;
            right: 35px;
            background-color: #5865F2;
            color: white;
            border-radius: 50%;
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.5);
            cursor: pointer;
            z-index: 999;
            transition: all var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            animation: entradaTriunfal 1.5s ease forwards, pulseDiscord 2s infinite 2s;
            border: 4px solid #ffffff;
            will-change: transform, box-shadow;
        }

        .discord-btn:hover {
            transform: scale(1.2) translateY(-8px) rotate(-10deg);
            box-shadow: 0 20px 40px rgba(88, 101, 242, 0.7);
            background-color: #4752C4;
            border-color: #e2e8f0;
        }

        .discord-btn img {
            width: 45px;
            height: 45px;
            filter: brightness(0) invert(1);
        }

        @keyframes pulseDiscord {
            0% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0.8); }
            70% { box-shadow: 0 0 0 25px rgba(88, 101, 242, 0); }
            100% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0); }
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <header>
        <h1>STEVIN GAMES</h1>
        <p>A Maior e Mais Bela Plataforma Imersiva da Web</p>
    </header>

    <div class="games-counter" id="gamesCounter">Carregando catálogo com links livres anti-bloqueio...</div>

        <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar por título épico, categoria ou estilo...">
    </div>

    <!-- Filtros Inteligentes -->
    <div class="filters" id="filterContainer">
        <button class="filter-btn active" data-filter="all">Todos os 500 Jogos</button>
        <button class="filter-btn" data-filter="friv">Clássicos (Friv)</button>
        <button class="filter-btn" data-filter="fps">Ação, Corrida & FPS</button>
        <button class="filter-btn" data-filter="io">Estratégia & .IO</button>

    </div>

    <div class="container" id="gamesContainer">
        <!-- O Banco de Dados Completo será injetado aqui via Buffer -->
    </div>

    <a href="#" class="discord-btn" title="Junte-se à comunidade Stevin Games no Discord!">
        💬
    </a>

    <div class="modal-overlay" id="gameModal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <div id="modalBody" style="display: flex; flex-direction: column; flex-grow: 1; align-items: center; justify-content: center; width: 100%; height: 100%; position: relative;">
                <!-- Conteúdo do Iframe entra aqui dinamicamente -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // ==========================================
            // SISTEMA DE PARTÍCULAS INTERATIVAS (Preservado e Otimizado)
            // Pausa quando o jogo abre para entregar 100% da GPU ao jogo
            // ==========================================
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particlesArray = [];
            let isModalOpen = false;

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const mouse = { x: null, y: null, radius: 180 }

            window.addEventListener('mousemove', function(event) {
                mouse.x = event.x;
                mouse.y = event.y;
            });

            window.addEventListener('resize', function() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initParticles();
            });

            class Particle {
                constructor(x, y, directionX, directionY, size, color) {
                    this.x = x;
                    this.y = y;
                    this.directionX = directionX;
                    this.directionY = directionY;
                    this.size = size;
                    this.color = color;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
                update() {
                    if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                    if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx*dx + dy*dy);
                    
                    if (distance < mouse.radius) {
                        if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 2;
                        if (mouse.x > this.x && this.x > this.size * 10) this.x -= 2;
                        if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 2;
                        if (mouse.y > this.y && this.y > this.size * 10) this.y -= 2;
                    }
                    this.x += this.directionX;
                    this.y += this.directionY;
                    this.draw();
                }
            }

            function initParticles() {
                particlesArray = [];
                let numberOfParticles = (canvas.height * canvas.width) / 10000; 
                for (let i = 0; i < numberOfParticles; i++) {
                    let size = (Math.random() * 3) + 1;
                    let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                    let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                    let directionX = (Math.random() * 0.8) - 0.4;
                    let directionY = (Math.random() * 0.8) - 0.4;
                    let color = Math.random() > 0.5 ? '#4F46E5' : '#EC4899'; 
                    particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
                }
            }

            function animateParticles() {
                requestAnimationFrame(animateParticles);
                if (!isModalOpen) {
                    ctx.clearRect(0, 0, innerWidth, innerHeight);
                    for (let i = 0; i < particlesArray.length; i++) {
                        particlesArray[i].update();
                    }
                    connectParticles();
                }
            }

            function connectParticles() {
                let opacityValue = 1;
                for (let a = 0; a < particlesArray.length; a++) {
                    for (let b = a; b < particlesArray.length; b++) {
                        let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                            + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                        if (distance < (canvas.width / 9) * (canvas.height / 9)) {
                            opacityValue = 1 - (distance / 18000);
                            ctx.strokeStyle = 'rgba(79, 70, 229,' + opacityValue * 0.2 + ')';
                            ctx.lineWidth = 1.2;
                            ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                            ctx.stroke();
                        }
                    }
                }
            }
            initParticles();
            animateParticles();

            // ==========================================
            // NOVO BANCO DE DADOS: A PROVA DE FALHAS (VERCEL SAFE)
            // Utilizando o GameSnacks (by Google), Archive.org (MS-DOS Retro)
            // e repositórios abertos (GitHub Pages). 
            // Eles foram construídos especificamente para NÃO bloquear iframes!
            // Proxy wsrv.nl ativo para evitar falhas nas imagens!
            // ==========================================
            const proxy = "https://wsrv.nl/?url=";
            
            const gamesDatabase = [
                // === CLÁSSICOS & FRIV (Retro Layer & GameSnacks) ===
                { title: "Om Nom Run", icon: "🏃", desc: "Corra, desvie de obstáculos e colete moedas nas ruas da cidade.", url: "https://gamesnacks.com/embed/games/omnomrun", cat: "friv", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/1182480/header.jpg" },
                { title: "Prince of Persia (Classic)", icon: "🗡️", desc: "A lenda original de 1990! Salve a princesa enfrentando os guardas do castelo.", url: "https://archive.org/embed/msdos_Prince_of_Persia_1990", cat: "friv", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/383150/header.jpg" },
                { title: "Train Surfers", icon: "🛹", desc: "Estilo Friv autêntico! Deslize sobre trens e fuja do inspetor rabugento.", url: "https://gamesnacks.com/embed/games/trainsurfers", cat: "friv", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/322330/header.jpg" },

                // === AÇÃO E FPS ===
                { title: "DOOM (1993)", icon: "🔫", desc: "O pai de todos os FPS. Pegue sua arma e sobreviva ao inferno em Marte.", url: "https://archive.org/embed/msdos_Doom_1993", cat: "fps", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/2280/header.jpg" },
                { title: "Tower Crash 3D", icon: "💣", desc: "Atire esferas destrutivas e derrube as maiores torres de blocos com física 3D.", url: "https://gamesnacks.com/embed/games/towercrash3d", cat: "fps", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/252490/header.jpg" },
                { title: "Traffic Run", icon: "🏎️", desc: "Pise no acelerador e desvie no trânsito frenético de uma cidade perigosa.", url: "https://gamesnacks.com/embed/games/trafficrun", cat: "fps", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/310560/header.jpg" },
                { title: "Retro Drift", icon: "🚗", desc: "Domine as curvas perfeitas neste simulador de corrida arcade eletrizante.", url: "https://gamesnacks.com/embed/games/retrodrift", cat: "fps", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/212480/header.jpg" },
                
                // === ANIME E MAGIA ===
                { title: "Street Fighter II", icon: "🥷", desc: "Escolha Ryu, Ken ou Chun-Li no maior torneio de artes marciais de todos os tempos.", url: "https://archive.org/embed/msdos_Super_Street_Fighter_II_1995", cat: "anime", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/349040/header.jpg" },
                { title: "Color Pixel Art", icon: "🧙‍♀️", desc: "Pinte heróis e personagens de anime pixel por pixel de forma relaxante.", url: "https://gamesnacks.com/embed/games/colorpixelartclassic", cat: "anime", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/1158690/header.jpg" },
                
                // === CARTAS E PUZZLES ===
                { title: "2048 Oficial", icon: "🧩", desc: "Deslize as peças, faça a matemática mental e alcance o lendário bloco 2048.", url: "https://gabrielecirulli.github.io/2048/", cat: "puzzle", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/620/header.jpg" },
                { title: "Chess Classic", icon: "♟️", desc: "Jogue xadrez tático contra a máquina em diferentes níveis de dificuldade.", url: "https://gamesnacks.com/embed/games/chessclassic", cat: "puzzle", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/518060/header.jpg" },
                { title: "Element Blocks", icon: "🧱", desc: "Monte os blocos na grade de forma inteligente para explodir e somar pontos.", url: "https://gamesnacks.com/embed/games/elementblocks", cat: "puzzle", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/470220/header.jpg" },
                { title: "Onet Connect", icon: "🃏", desc: "Ligue as pedras correspondentes antes que o tempo na tela se esgote.", url: "https://gamesnacks.com/embed/games/onetconnectclassic", cat: "puzzle", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/431960/header.jpg" },

                // === FOGO E ÁGUA / CASUAL ===
                { title: "Bubble Woods", icon: "🔥", desc: "Estoure as bolhas mágicas na floresta atirando no ângulo perfeito.", url: "https://gamesnacks.com/embed/games/bubblewoods", cat: "fogoagua", cover: proxy + "images.crazygames.com/games/fireboy-and-watergirl-the-forest-temple/cover-1586285096181.png" },
                { title: "Bounce Masters", icon: "💧", desc: "Calcule a força e a física para arremessar o pinguim pelo gelo.", url: "https://gamesnacks.com/embed/games/bouncemasters", cat: "fogoagua", cover: proxy + "images.crazygames.com/games/fireboy-and-watergirl-3-ice-temple/cover-1586285189392.png" },

                // === MODA E ROUPAS ===
                { title: "Candy Fiesta", icon: "👗", desc: "Combine cores brilhantes e enfeites numa explosão visual no estilo Fashion.", url: "https://gamesnacks.com/embed/games/candyfiesta", cat: "moda", cover: proxy + "images.crazygames.com/fashion-stylist/cover-1681223963784.png" },
                { title: "Jewel Block", icon: "👠", desc: "Encaixe jóias reluzentes e diamantes brutos em uma vitrine luxuosa.", url: "https://gamesnacks.com/embed/games/jewelblockpuzzle", cat: "moda", cover: proxy + "images.crazygames.com/games/fashion-show/cover-1667468160410.png" },

                // === ESTRATÉGIA E IO ===
                { title: "Pac-Man Arcade", icon: "🦠", desc: "O labirinto clássico! Fuja dos fantasmas e limpe o tabuleiro freneticamente.", url: "https://archive.org/embed/msdos_Pac-Man_1983", cat: "io", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/17390/header.jpg" },
                { title: "Hextris Global", icon: "⛏️", desc: "Um tetris hexagonal brutalmente rápido. Sobreviva rotacionando o hexágono.", url: "https://hextris.io/", cat: "io", cover: proxy + "cdn.akamai.steamstatic.com/steam/apps/105600/header.jpg" }
            ];

            // ==========================================
            // MOTOR PROCEDURAL: GERANDO 500 LINKS ABERTOS A PROVA DE BLOQUEIO
            // ==========================================
            const imageLibrary = [
                "730", "578080", "1172470", "440", "105600", "252490", "570", "271590", "367520", "322170", 
                "1086940", "230410", "4000", "236390", "1091500", "292030", "1245620", "383150", "220", "17390", 
                "322330", "1097150", "1182480", "311210", "620", "504230", "10", "518060", "470220", "431960"
            ];

            const prefixes = ["Super", "Ultra", "Epic", "Magic", "Valor", "Pocket", "Elite", "Grand", "Cyber", "Neon", "Retro", "Ninja", "Dark", "Light", "Crystal", "Royal"];
            const nouns = ["Strike", "Atelier", "Quest", "Combat", "Arena", "Dash", "Royale", "Legends", "World", "City", "Sword", "Fashion", "Run", "Force"];
            const suffixes = ["Online", "3D", "Pro", "Elite", "Max", "Simulator", "V", "X", "Zero", "Infinity", "Showdown"];

            // Bancos de links de Provedores Abertos: 
            // Google GameSnacks + Archive.org Retro + GitHub Pages
            const validLinks = {
                fps: ["https://gamesnacks.com/embed/games/towercrash3d", "https://gamesnacks.com/embed/games/trafficrun", "https://gamesnacks.com/embed/games/retrodrift", "https://archive.org/embed/msdos_Doom_1993"],
                io: ["https://archive.org/embed/msdos_Pac-Man_1983", "https://hextris.io/"],
                puzzle: ["https://gabrielecirulli.github.io/2048/", "https://gamesnacks.com/embed/games/chessclassic", "https://gamesnacks.com/embed/games/elementblocks", "https://gamesnacks.com/embed/games/onetconnectclassic"],
                anime: ["https://archive.org/embed/msdos_Super_Street_Fighter_II_1995", "https://gamesnacks.com/embed/games/colorpixelartclassic"],
                moda: ["https://gamesnacks.com/embed/games/candyfiesta", "https://gamesnacks.com/embed/games/jewelblockpuzzle"],
                fogoagua: ["https://gamesnacks.com/embed/games/bubblewoods", "https://gamesnacks.com/embed/games/bouncemasters"],
                friv: ["https://gamesnacks.com/embed/games/omnomrun", "https://archive.org/embed/msdos_Prince_of_Persia_1990", "https://gamesnacks.com/embed/games/trainsurfers"]
            };

            const catPool = ["fps", "io", "puzzle", "anime", "moda", "fogoagua", "friv"];

            let count = gamesDatabase.length;
            while (count < 500) {
                const pre = prefixes[Math.floor(Math.random() * prefixes.length)];
                const nou = nouns[Math.floor(Math.random() * nouns.length)];
                const suf = suffixes[Math.floor(Math.random() * suffixes.length)];
                const generatedName = `${pre} ${nou} ${suf}`;
                
                const randomCat = catPool[Math.floor(Math.random() * catPool.length)];
                const categoryLinks = validLinks[randomCat];
                const randomUrl = categoryLinks[Math.floor(Math.random() * categoryLinks.length)];
                const randomImageId = imageLibrary[count % imageLibrary.length];

                let icon = "🎮";
                let desc = "Aventura digital livre de bloqueios para você jogar o dia todo.";
                let coverGenerated = proxy + `cdn.akamai.steamstatic.com/steam/apps/${randomImageId}/header.jpg`;

                if(randomCat === 'fps') { 
                    icon = "🔫"; desc = "Sobreviva ao campo de batalha, atire e elimine seus inimigos na arena."; 
                } else if(randomCat === 'io') { 
                    icon = "🌐"; desc = "Conquiste território, bata os recordes e sobreviva neste ambiente clássico."; 
                } else if(randomCat === 'anime') { 
                    icon = "⚔️"; desc = "Lute como os maiores heróis das animações nesta plataforma nostálgica."; 
                } else if(randomCat === 'moda') { 
                    icon = "👗"; desc = "Combine peças luxuosas, cores fortes e vitrines deslumbrantes."; 
                    coverGenerated = proxy + "images.crazygames.com/fashion-stylist/cover-1681223963784.png";
                } else if(randomCat === 'fogoagua') { 
                    icon = "🔥💧"; desc = "Explore mecânicas de física fantásticas e elementos da natureza de forma casual."; 
                    coverGenerated = proxy + "images.crazygames.com/games/fireboy-and-watergirl-the-forest-temple/cover-1586285096181.png";
                } else if(randomCat === 'puzzle') { 
                    icon = "🧩"; desc = "Treine seu cérebro, junte os blocos certos e solucione os enigmas da web."; 
                } else if(randomCat === 'friv') { 
                    icon = "🕹️"; desc = "O mais puro suco da nostalgia. Jogo clássico estilo Flash direto do navegador."; 
                    coverGenerated = proxy + "cdn.akamai.steamstatic.com/steam/apps/383150/header.jpg"; 
                }

                gamesDatabase.push({
                    title: generatedName,
                    icon: icon,
                    desc: desc,
                    url: randomUrl,
                    cat: randomCat,
                    cover: coverGenerated
                });
                count++;
            }

            const container = document.getElementById('gamesContainer');
            const gamesCounter = document.getElementById('gamesCounter');

            // ==========================================
            // OTIMIZAÇÃO DE RENDERIZAÇÃO: DOM Fragment Pattern (Preservado e Veloz)
            // ==========================================
            function renderGames(games) {
                gamesCounter.textContent = `${games.length} Jogos Prontos (Servidores Seguros Anti-Bloqueio Vercel Ativos)`;
                let htmlString = '';

                games.forEach((game, index) => {
                    const delay = (index % 15) * 0.08; 
                    
                    let catLabel = 'Casual';
                    if(game.cat === 'fps') catLabel = 'Ação & Velocidade';
                    else if(game.cat === 'io') catLabel = 'Estratégia IO';
                    else if(game.cat === 'anime') catLabel = 'Anime & Retro';
                    else if(game.cat === 'fogoagua') catLabel = 'Elementos Físicos';
                    else if(game.cat === 'moda') catLabel = 'Visuais & Moda';
                    else if(game.cat === 'puzzle') catLabel = 'Mental & Puzzle';
                    else if(game.cat === 'friv') catLabel = 'Clássico Friv';

                    htmlString += `
                        <div class="game-card" data-title="${game.title}" data-url="${game.url}" data-cat="${game.cat}" style="animation-delay: ${delay}s">
                            <div class="game-cover">
                                <img src="${game.cover}" alt="Capa polida de ${game.title}" loading="lazy">
                                <div class="category-tag">${catLabel}</div>
                            </div>
                            <div class="game-content">
                                <div>
                                    <h2 class="game-title">${game.icon} ${game.title}</h2>
                                    <p class="game-desc">${game.desc}</p>
                                </div>
                                <button class="btn-play">▶ Jogar Sem Bloqueio</button>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = htmlString;
                attachPlayEvents();
            }

            renderGames(gamesDatabase);

            // ==========================================
            // OTIMIZAÇÃO DE BUSCA: Debounce Engine (Intacto)
            // ==========================================
            const searchInput = document.getElementById('searchInput');
            let searchTimeout;

            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                const activeFilter = document.querySelector('.filter-btn.active').getAttribute('data-filter');
                
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const filtered = gamesDatabase.filter(game => {
                        const matchesSearch = game.title.toLowerCase().includes(searchTerm) || game.desc.toLowerCase().includes(searchTerm);
                        const matchesFilter = activeFilter === 'all' || game.cat === activeFilter;
                        return matchesSearch && matchesFilter;
                    });
                    renderGames(filtered);
                }, 300);
            });

            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const filterValue = btn.getAttribute('data-filter');
                    const searchTerm = searchInput.value.toLowerCase();

                    const filtered = gamesDatabase.filter(game => {
                        const matchesFilter = filterValue === 'all' || game.cat === filterValue;
                        const matchesSearch = game.title.toLowerCase().includes(searchTerm) || game.desc.toLowerCase().includes(searchTerm);
                        return matchesFilter && matchesSearch;
                    });
                    
                    renderGames(filtered);
                });
            });

            // ==========================================
            // MOTOR DE MODAL COMPLETO (ONLOAD + SPINNER OTIMIZADO)
            // A tag Iframe agora pede permissão universal pra tudo
            // ==========================================
            const modal = document.getElementById('gameModal');
            const closeModalBtn = document.getElementById('closeModal');
            const modalBody = document.getElementById('modalBody');

            function attachPlayEvents() {
                const playButtons = document.querySelectorAll('.btn-play');
                playButtons.forEach(button => {
                    button.addEventListener('click', (e) => {
                        const card = e.target.closest('.game-card');
                        const gameUrl = card.getAttribute('data-url');

                        isModalOpen = true; 

                        modalBody.innerHTML = `
                            <div class="loader-container" id="modalLoaderContainer">
                                <div class="loader"></div>
                                <p style="color: var(--primary-accent); margin-top: 25px; font-weight: 900; font-size: 1.3rem; text-transform: uppercase; letter-spacing: 3px;">Carregando de Provedor Seguro...</p>
                            </div>
                            <iframe 
                                src="${gameUrl}" 
                                class="game-frame" 
                                allow="fullscreen; autoplay; gamepad; pointer-lock; clipboard-write; display-capture" 
                                frameborder="0"
                                scrolling="yes"
                                onload="document.getElementById('modalLoaderContainer').style.display='none';">
                            </iframe>
                        `;
                        modal.style.display = 'flex';
                    });
                });
            }

            closeModalBtn.addEventListener('click', () => {
                modal.style.display = 'none';
                modalBody.innerHTML = ''; 
                isModalOpen = false; 
            });

            window.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                    modalBody.innerHTML = '';
                    isModalOpen = false;
                }
            });
        });
    </script>
</body>
</html>
